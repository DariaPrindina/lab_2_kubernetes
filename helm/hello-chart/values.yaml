replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: '1.25.4'

nameOverride: ''
fullnameOverride: ''

service:
  type: NodePort
  port: 80
  nodePort: 30081

resources:
  requests:
    cpu: '100m'
    memory: '64Mi'
  limits:
    cpu: '200m'
    memory: '128Mi'

configMap:
  html: |
    <!doctype html>
    <html lang="ru">
      <head>
        <meta charset="UTF-8" />
        <title>Helm Lab part 2</title>
      </head>
      <body>
        <h1>Hello from Helm v1</h1>
      </body>
    </html>

autoscaling:
  enabled: false

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

imagePullSecrets: []
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

httpRoute:
  enabled: false

ingress:
  enabled: false
